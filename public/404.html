<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Lost in the Void — One Strange Thing</title>
  <meta name="description" content="This page has been claimed by the void.">
  <meta name="robots" content="noindex">
  <meta name="theme-color" content="#f5f0e8" media="(prefers-color-scheme: light)">
  <meta name="theme-color" content="#1a1410" media="(prefers-color-scheme: dark)">
  <link rel="icon" href="/favicon.svg" type="image/svg+xml">
  <link rel="apple-touch-icon" href="/apple-touch-icon.png">
  <link rel="stylesheet" href="/styles.css">
  <style>
    .void-content {
      padding: 3rem 1rem 2rem;
      text-align: center;
    }

    .void-glyph {
      font-size: 3.5rem;
      line-height: 1;
      margin-bottom: 1.5rem;
      opacity: 0.35;
      filter: grayscale(40%);
      animation: drift 6s ease-in-out infinite;
    }

    @keyframes drift {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-6px); }
    }

    .void-code {
      font-size: 0.75rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--accent);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      font-weight: 600;
      margin-bottom: 1rem;
    }

    .void-heading {
      font-size: 1.5rem;
      line-height: 1.3;
      color: var(--text-heading);
      margin-bottom: 0.75rem;
      font-weight: 600;
      text-wrap: balance;
    }

    .void-subtext {
      font-size: 1rem;
      line-height: 1.7;
      color: var(--text-secondary);
      font-style: italic;
      margin-bottom: 2rem;
    }

    .void-return {
      display: inline-block;
      color: var(--accent);
      text-decoration: underline;
      text-decoration-color: var(--link-underline);
      text-underline-offset: 3px;
      font-size: 0.95rem;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      letter-spacing: 0.03em;
      padding: 0.6rem 1.25rem;
      border: 1px solid var(--border);
      border-radius: 2px;
      text-decoration: none;
      transition: background-color 0.15s ease, border-color 0.15s ease;
    }

    @media (hover: hover) and (pointer: fine) {
      .void-return:hover {
        background-color: color-mix(in srgb, var(--accent) 8%, transparent);
        border-color: var(--accent);
        color: var(--accent);
      }
    }

    @media (prefers-reduced-motion: reduce) {
      .void-glyph {
        animation: none;
      }
    }
  </style>
</head>
<body>
  <a href="#content" class="skip-link">Skip to content</a>
  <main>
    <header>
      <h1>One Strange Thing</h1>
      <p class="tagline">A daily dispatch from the realm of the unexplained</p>
    </header>
    <article id="content">
      <div class="void-content">
        <div class="void-glyph" aria-hidden="true">☽ ✦ ☾</div>
        <p class="void-code">404 &mdash; Beyond the Veil</p>
        <h2 class="void-heading">This page has been claimed by the void.</h2>
        <p class="void-subtext">The spirits have no record of this location.</p>
        <a href="/" class="void-return">Return to the known world &rarr;</a>
      </div>
    </article>
  </main>
  <footer class="site-credit">
    <p>Conjured by Hiro from the <a href="https://hiro.report">Hiro Report</a> &#9825;</p>
  </footer>
  <!-- 100% privacy-first analytics -->
  <script data-collect-dnt="true" async src="https://scripts.simpleanalyticscdn.com/latest.js"></script>
</body>
</html>
